name: Update Pokefuta data

on:
  schedule:
    - cron: "0 0 * * *" # 毎日 00:00 UTC（= 09:00 JST）
  workflow_dispatch: {} # 手動実行も可能

permissions:
  contents: write
  issues: write

concurrency:
  group: update-pokefuta
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest Pokefuta data
        run: python scripts/fetch_pokefuta.py

      - name: Detect changes
        id: diff
        run: |
          if [ -z "$(git status --porcelain data app/src/data)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "変更なし" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git show HEAD:data/pokefuta.json > /tmp/old.json
            python scripts/report_changes.py /tmp/old.json data/pokefuta.json > /tmp/report.md
            cat /tmp/report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Commit & push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          {
            echo "chore(data): update Pokefuta dataset [skip ci]"
            echo
            cat /tmp/report.md
          } > /tmp/commit_msg.txt
          git add data app/src/data
          git commit -F /tmp/commit_msg.txt
          git push

      - name: Notify via issue
        if: steps.diff.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/report.md', 'utf8');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🆕 ポケふたデータが更新されました (${new Date().toISOString().slice(0,10)})`,
              body,
            });
